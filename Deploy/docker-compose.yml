version: "3"

services:

  backend:
    container_name: kefirchik-server
    build:
      context: ../
      dockerfile: ./Deploy/Dockerfile
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10m
        max_attempts: 3
    volumes:
      - './../Database:/var/lib/kefirchik'
    ports:
     - "8443:8443"
    environment:
      - MODE=${MODE:-release}
      - TG_TOKEN=${TG_TOKEN}
      - PROXY_URL=${PROXY_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
